# ser2net console proxy as a LAVA Test Services container (external-network variant).
#
# Started at the beginning of the job so a user can watch the board's console during
# deploy and boot. It relays the console read-only and only enables user writes once it
# sees the console-ready sentinel (emitted by the job's console-ready test after boot) —
# so it never writes while LAVA drives the boot. When a gateway session is configured
# (GATEWAY_*/SESSION_*/REVERSE_PORT/SESSION_PRIVATE_KEY_B64 from lava-mcp's
# open_console_session), it dials OUT to the lava-mcp gateway so the console surfaces on
# the master; otherwise it runs relay-only (watch via docker logs). See the baked image
# (Dockerfile, console-connect.sh, console-proxy.py).
#
# The console server (`telnet ser2net 7095`) is a container on the worker's Docker
# network, so this proxy joins that external network. Host-networking variant:
# docker-compose.host.yml.
#
# Overridable via the job/device `environment` (LAVA writes it to the compose .env):
#   SER2NET_NETWORK external Docker network the console server is on
#   SER2NET_HOST/PORT        console endpoint
#   CONSOLE_LISTEN_PORT      port the relay listens on (reverse-forwarded to the gateway)
#   CONSOLE_READY_SENTINEL   string that unlocks writes (match the job's echo)
#   GATEWAY_HOST, GATEWAY_WS_URL, SESSION_ID, REVERSE_PORT, SESSION_PRIVATE_KEY_B64  (dial-out)
services:
  ser2net-proxy:
    image: ghcr.io/mattface/lava-mcp/ser2net-proxy:latest
    pull_policy: always
    networks: [lab]
    # LAVA writes the job+device `environment:` to a .env at the *repo root* — but
    # docker compose only auto-reads a .env from the compose file's own directory, so
    # `${VAR}` interpolation here silently got nothing. Load LAVA's .env explicitly
    # (path is relative to this compose file: two levels up to the repo root); this
    # injects GATEWAY_*/SESSION_*/SER2NET_*/CONSOLE_* straight into the container.
    # Missing values fall back to console-proxy.py / console-connect.sh defaults.
    env_file:
      - ../../.env

networks:
  lab:
    external: true
    name: ${SER2NET_NETWORK:-lava-dispatcher_default}
