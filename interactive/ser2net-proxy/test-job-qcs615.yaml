# lava-mcp serial-console test job for qcs615-adp-air-04 (device-type qcs615-ride).
#
# Based on health-check job 4916, trimmed to a single qdl deploy + boot to a shell.
# The ser2net console proxy is started as a Test Services container at the *beginning*
# of the job, so a user can watch the console during deploy and boot. The proxy relays
# read-only until the console-ready test (after boot) echoes the sentinel, then allows
# writes. The device dict for qcs615-adp-air-04 has `allow_test_services: true`.
#
# Submit with: lavacli jobs submit test-job-qcs615.yaml  (or the web "Submit" form)
device_type: qcs615-ride
job_name: lava-mcp serial-console test (watch-from-start + console-ready)
priority: medium
visibility: public

timeouts:
  job:
    minutes: 70
  action:
    minutes: 20
  connection:
    minutes: 8

context:
  lava_test_results_dir: /home/lava-%s
  test_character_delay: 10

# Config for the ser2net-proxy Test Services container. LAVA writes these into the
# compose .env (merged with the device's environment), overriding the compose defaults.
# SER2NET_NETWORK is the external Docker network the console server sits on (used by
# docker-compose.yml; ignored by the host-networking variant). CONSOLE_READY_SENTINEL
# must match the string echoed by the console-ready test below.
#
# ALSO add the values open_console_session returns to this same block (they tell the
# proxy how to dial back): GATEWAY_HOST, GATEWAY_WS_URL, SESSION_ID, REVERSE_PORT,
# SESSION_PRIVATE_KEY_B64. They are per-session, so add them at submit time.
environment:
  SER2NET_NETWORK: lava-dispatcher_default
  SER2NET_HOST: ser2net
  SER2NET_PORT: "7095"
  CONSOLE_READY_SENTINEL: LAVA_MCP_CONSOLE_WRITABLE
  # + GATEWAY_HOST / GATEWAY_WS_URL / SESSION_ID / REVERSE_PORT / SESSION_PRIVATE_KEY_B64
  #   from open_console_session

actions:
# Start the console proxy first, before deploy/boot, so it can watch the console from
# the very start of the job. It stays read-only until console-ready (see below).
# path selects the network mode: docker-compose.yml joins the external Docker network
# named by SER2NET_NETWORK (default); docker-compose.host.yml uses host networking.
- test:
    namespace: console
    timeout:
      minutes: 70
    services:
    - name: ser2net-proxy
      from: git
      repository: https://github.com/mattface/lava-mcp.git
      path: interactive/ser2net-proxy/docker-compose.yml

- deploy:
    rootfs_image: "core-image-base-qcs615-ride/rootfs.img"
    qcomflash:
      headers:
        Authorization: LAVA_BASIC_AUTH
      url: 'https://s.lava.infra.foundries.io/qcs615-adp-air/core-image-base-qcs615-ride.rootfs.qcomflash.tar.gz'
      apply-overlay: true
    timeout:
      minutes: 20
    to: qdl
    namespace: qdl

- boot:
    firehose_program: "prog_firehose_ddr.elf"
    rawprogram: "rawprogram0.xml rawprogram1.xml rawprogram2.xml rawprogram3.xml rawprogram4.xml"
    patch: "patch0.xml patch1.xml patch2.xml patch3.xml patch4.xml"
    path: "core-image-base-qcs615-ride"
    storage: "ufs"
    debug: true
    timeout:
      minutes: 15
    method: qdl
    namespace: qdl

- boot:
    auto_login:
      login_prompt: 'login:'
      username: root
    prompts:
    - root@qcs615-ride
    - root@(.*):[/~]#
    timeout:
      minutes: 2
    method: minimal
    namespace: qdl

# Board is now at a shell. Signal console-ready and echo the sentinel to the console
# (this line goes to the UART, where the proxy sees it and enables user writes). Then
# hold the reservation (with periodic output so the connection does not idle out).
# The echoed string must match CONSOLE_READY_SENTINEL above.
- test:
    namespace: qdl
    connection-namespace: qdl
    timeout:
      minutes: 50
    definitions:
    - from: inline
      name: console-ready
      path: inline/console-ready.yaml
      repository:
        metadata:
          format: Lava-Test Test Definition 1.0
          name: console-ready
          description: Emit console-ready, unlock the proxy, then hold.
        run:
          steps:
          - lava-test-case console-ready --result pass
          - echo "LAVA_MCP_CONSOLE_WRITABLE"
          - 'for i in $(seq 1 80); do echo "console-hold tick $i"; sleep 30; done'
