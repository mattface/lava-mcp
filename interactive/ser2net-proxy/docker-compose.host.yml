# ser2net console proxy as a LAVA Test Services container (host-networking variant).
#
# Use this when the board's console server is reachable on the LAVA worker's own
# network (a real DNS/hosts name or a host-published port) rather than via a Docker
# network. Select it by pointing the job's services `path` at this file. The
# external-network (default) variant is docker-compose.yml. Behaviour is identical:
# starts at the beginning of the job, relays read-only until console-ready, and dials
# OUT to the lava-mcp gateway when a session is configured.
#
# Overridable via the job/device `environment` (LAVA writes it to the compose .env):
#   SER2NET_HOST/PORT        console endpoint reachable from the worker host
#   CONSOLE_LISTEN_PORT      port the relay listens on (reverse-forwarded to the gateway)
#   CONSOLE_READY_SENTINEL   string that unlocks writes (match the job's echo)
#   GATEWAY_HOST, GATEWAY_WS_URL, SESSION_ID, REVERSE_PORT, SESSION_PRIVATE_KEY_B64  (dial-out)
services:
  ser2net-proxy:
    image: ghcr.io/mattface/lava-mcp/ser2net-proxy:latest
    pull_policy: always
    network_mode: host
    environment:
      SER2NET_HOST: ${SER2NET_HOST:-ser2net}
      SER2NET_PORT: ${SER2NET_PORT:-7095}
      CONSOLE_LISTEN_PORT: ${CONSOLE_LISTEN_PORT:-2323}
      CONSOLE_READY_SENTINEL: ${CONSOLE_READY_SENTINEL:-LAVA_MCP_CONSOLE_WRITABLE}
      GATEWAY_HOST: ${GATEWAY_HOST:-}
      GATEWAY_WS_URL: ${GATEWAY_WS_URL:-}
      SESSION_ID: ${SESSION_ID:-}
      REVERSE_PORT: ${REVERSE_PORT:-}
      SESSION_PRIVATE_KEY_B64: ${SESSION_PRIVATE_KEY_B64:-}
