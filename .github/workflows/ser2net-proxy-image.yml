name: ser2net-proxy image

# Build the serial-console proxy container and publish it to GHCR
# (ghcr.io/<owner>/lava-mcp/ser2net-proxy). LAVA Test Services pulls this image to run
# the ser2net console relay + dial-out; see interactive/ser2net-proxy/Dockerfile.

on:
  push:
    branches: [master]
    paths:
      - interactive/ser2net-proxy/**
      - .github/workflows/ser2net-proxy-image.yml
  pull_request:
    paths:
      - interactive/ser2net-proxy/**
      - .github/workflows/ser2net-proxy-image.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ser2net-proxy

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Don't push on pull_request (forks have no package write access).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: interactive/ser2net-proxy
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
