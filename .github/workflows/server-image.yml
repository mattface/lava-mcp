name: server image

# Build the hosted lava-mcp server (streamable-HTTP transport) and publish it to
# GHCR (ghcr.io/<owner>/lava-mcp). Hosted deployments (e.g. the foundries factory)
# pull this image; see the root Dockerfile.

on:
  push:
    branches: [master]
    paths:
      - lava_mcp/**
      - pyproject.toml
      - README.md
      - Dockerfile
      - .github/workflows/server-image.yml
  pull_request:
    paths:
      - lava_mcp/**
      - pyproject.toml
      - README.md
      - Dockerfile
      - .github/workflows/server-image.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Don't push on pull_request (forks have no package write access).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
